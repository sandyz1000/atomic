name: Release — JavaScript (npm)

on:
  workflow_dispatch: # disabled — re-enable by restoring push/tags triggers

jobs:
  build-bindings:
    name: Build native binding — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            node-arch: arm64
          # Linux x86_64 glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node-arch: x64
          # Linux x86_64 musl (static / Alpine)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            node-arch: x64
          # Linux arm64 glibc
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            node-arch: arm64
          # Linux arm64 musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            node-arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl targets require musl-libc headers and cross-linker.
      - name: Install musl tools (Linux musl targets)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      # arm64-linux glibc cross-compilation requires a cross-linker.
      - name: Install cross-compilation linker (Linux aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      # arm64-linux musl also needs aarch64 musl cross-toolchain.
      - name: Install cross-compilation linker (Linux aarch64-musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Install JS dependencies
        working-directory: crates/atomic-js
        run: npm install

      - name: Build native addon
        working-directory: crates/atomic-js
        run: |
          npx napi build \
            --platform \
            --release \
            --target ${{ matrix.target }}

      - name: Upload .node binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/atomic-js/*.node

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-bindings

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install JS dependencies
        working-directory: crates/atomic-js
        run: npm install

      - name: Compile TypeScript loader
        working-directory: crates/atomic-js
        run: npm run prepare

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "bindings-*"
          merge-multiple: true
          path: crates/atomic-js/

      # napi prepublish step: copies .node files to platform-specific packages
      # and updates the root package.json optionalDependencies map.
      - name: Prepublish (bundle platform packages)
        working-directory: crates/atomic-js
        run: npx napi prepublish --skip-gh-release

      - name: Publish to npm
        working-directory: crates/atomic-js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
