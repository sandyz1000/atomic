schema_version = 1

[[wasm_artifacts]]
abi_version    = 1
module_path    = "build/wasm_json_task.wasm"

[wasm_artifacts.descriptor]
operation_id      = "demo.wc.json.v1"
execution_backend = "wasm"
artifact_kind     = "wasm"
artifact_ref      = "build/wasm_json_task.wasm"
entrypoint        = "run_word_count"
runtime           = "rust"
build_target      = "wasm32-wasip2"

[wasm_artifacts.descriptor.profile]
cpu_millis  = 250
memory_mb   = 64
timeout_ms  = 5000
