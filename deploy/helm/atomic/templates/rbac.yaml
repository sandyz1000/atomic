{{- if eq .Values.allocator "kube" }}
# With allocator: kube the driver creates and deletes worker pods through the
# Kubernetes API, so its ServiceAccount needs pod management rights in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "atomic.fullname" . }}-worker-allocator
  labels:
    {{- include "atomic.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "atomic.fullname" . }}-worker-allocator
  labels:
    {{- include "atomic.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "atomic.fullname" . }}-worker-allocator
subjects:
  - kind: ServiceAccount
    name: {{ include "atomic.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
